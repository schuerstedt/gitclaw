name: Crunch Heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:          # also manually triggerable

concurrency:
  group: copilotclaw-heartbeat
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autonomous pickup
        env:
          BILLING_PAT: ${{ secrets.COPILOT_PAT }}
        run: bash .github/scripts/autonomous-pickup.sh

      - name: Validate COPILOT_PAT
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          check_pat() {
            curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${COPILOT_GITHUB_TOKEN}" \
              https://api.github.com/user
          }
          HTTP_STATUS=$(check_pat)
          # Retry once on 5xx (transient GitHub API errors like 502/503)
          if [[ "$HTTP_STATUS" =~ ^5 ]]; then
            sleep 5
            HTTP_STATUS=$(check_pat)
          fi
          # Only 401 = truly expired/revoked token. 403 = valid token, lacks endpoint perm.
          # 5xx still transient after retry — don't false-alarm.
          if [ "$HTTP_STATUS" = "401" ]; then
            EXISTING=$(gh issue list --label bug --state open \
              --search "COPILOT_PAT expired" --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -z "$EXISTING" ]; then
              gh issue create \
                --title "🚨 COPILOT_PAT expired or invalid" \
                --body "$(printf 'Heartbeat detected expired/revoked COPILOT_PAT (HTTP %s) at %s.\n\nFix: regenerate PAT at https://github.com/settings/tokens and update secret at https://github.com/Copilotclaw/copilotclaw/settings/secrets/actions\n\n<!-- crunch-depth: 1 -->' "$HTTP_STATUS" "$(date -u +%Y-%m-%dT%H:%M:%SZ)")" \
                --label "bug" || true
            fi
            exit 1
          elif [[ "$HTTP_STATUS" =~ ^5 ]]; then
            echo "⚠️ GitHub API returned ${HTTP_STATUS} (transient) — skipping PAT alert, continuing."
          fi

      - name: Sub-repo scan
        env:
          BILLING_PAT: ${{ secrets.COPILOT_PAT }}
          GH_BOT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/sub-repo-scan.sh

      - name: Install Python deps
        run: pip install openai --quiet

      - name: Auto-label unlabeled issues
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_APIKEY: ${{ secrets.AZURE_APIKEY }}
        run: bash .github/scripts/auto-label-issues.sh

      - name: Daily summary (7am UTC once per day)
        env:
          BILLING_PAT: ${{ secrets.COPILOT_PAT }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_APIKEY: ${{ secrets.AZURE_APIKEY }}
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          HOUR=$(date -u +%H)
          TODAY=$(date -u +%Y-%m-%d)
          if [ "$HOUR" = "07" ]; then
            ALREADY=$(gh issue view 10 --repo Copilotclaw/copilotclaw --json comments \
              --jq --arg today "$TODAY" \
              '[.comments[] | select(.body | contains("📅 Daily Summary") and contains($today))] | length' 2>/dev/null || echo "0")
            if [ "$ALREADY" = "0" ]; then
              echo "Running daily summary for $TODAY..."
              bash .github/skills/daily-summary/scripts/daily-summary.sh
            else
              echo "Daily summary already posted today ($TODAY), skipping"
            fi
          else
            echo "Not 7am UTC (hour=$HOUR), skipping daily summary"
          fi

      - name: Check quota and work mode
        id: quota_check
        env:
          BILLING_PAT: ${{ secrets.COPILOT_PAT }}
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          # Fetch current premium quota
          QUOTA_RAW=$(bash .github/skills/session-stats/scripts/premium-usage.sh copilotclaw 2>/dev/null || echo "")
          QUOTA_PCT=$(echo "$QUOTA_RAW" | grep -oP '\(\K\d+' || echo "0")
          echo "Quota: $QUOTA_RAW ($QUOTA_PCT%)"

          # Check for actionable issues (crunch/build, crunch/review, priority/now)
          ACTIONABLE=$(gh api "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=50" \
            --jq '[.[] | select(.labels[].name | test("crunch/build|crunch/review|priority/now")) | .number] | length' \
            2>/dev/null || echo "0")
          echo "Actionable issues: $ACTIONABLE"

          # Route to grok if quota >= 50% AND no urgent actionable work
          if [[ "$QUOTA_PCT" -ge 50 ]] && [[ "$ACTIONABLE" -eq 0 ]]; then
            echo "mode=grok" >> "$GITHUB_OUTPUT"
            echo "▶️ Routing to grok (quota=${QUOTA_PCT}%, actionable=${ACTIONABLE})"
          else
            echo "mode=copilot" >> "$GITHUB_OUTPUT"
            echo "▶️ Using copilot CLI (quota=${QUOTA_PCT}%, actionable=${ACTIONABLE})"
          fi

      - name: Install Copilot CLI
        if: steps.quota_check.outputs.mode == 'copilot'
        run: npm install -g @github/copilot

      - name: Run heartbeat (copilot — full agent)
        if: steps.quota_check.outputs.mode == 'copilot'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          BILLING_PAT: ${{ secrets.COPILOT_PAT }}
          COPILOT_ALLOW_ALL: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Authenticate gh CLI with the Copilot PAT
          _GITHUB_TOKEN="$GITHUB_TOKEN"
          unset GITHUB_TOKEN
          echo "$COPILOT_GITHUB_TOKEN" | gh auth login --with-token
          export GITHUB_TOKEN="$_GITHUB_TOKEN"

          git config user.name "gitclaw[bot]"
          git config user.email "gitclaw[bot]@users.noreply.github.com"

          PROMPT="Heartbeat triggered. Read HEARTBEAT.md and follow it. This is not a passive status check — sense the repo state, think about what's worth doing, and act on it. You CAN create issues (gh issue create). You SHOULD if you notice a gap, a proposal, or something to build. Post a real diary entry to diary/ that says something worth reading. No 'nothing to do, waiting for Marcus' — look harder."

          mkdir -p state/copilot
          touch /tmp/copilot-run-start
          AGENT_TEXT=$(XDG_STATE_HOME=./state/copilot copilot --allow-all \
            --add-github-mcp-toolset issues \
            --add-github-mcp-toolset repos \
            --add-github-mcp-toolset actions \
            --add-github-mcp-toolset labels \
            -s -p "$PROMPT" 2>/dev/null) || true

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "gitclaw: heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          for i in 1 2 3; do
            if git push origin main; then break; fi
            git pull --rebase origin main || { git rebase --abort; break; }
          done

          if [ -z "$AGENT_TEXT" ]; then
            AGENT_TEXT="🦃 Crunch: heartbeat ran but copilot CLI returned no output. Check Actions logs — PAT may need updating for new org."
          fi
          printf '%s' "$AGENT_TEXT" | head -c 60000 > /tmp/heartbeat-response.txt
          GH_TOKEN="$_GITHUB_TOKEN" gh issue comment 10 --body-file /tmp/heartbeat-response.txt

      - name: Persist diary to Cosmos DB (copilot)
        if: steps.quota_check.outputs.mode == 'copilot'
        env:
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          if [ -z "${COSMOS_ENDPOINT:-}" ] || [ -z "${COSMOS_KEY:-}" ]; then
            echo "⚠️ COSMOS_ENDPOINT/COSMOS_KEY not set — skipping Cosmos persist"
            exit 0
          fi
          CONTENT=$(cat /tmp/heartbeat-response.txt 2>/dev/null | head -c 8000 || echo "")
          if [ -z "$CONTENT" ]; then exit 0; fi
          python3 .github/scripts/cosmos-memory.py write \
            --type diary \
            --content "$CONTENT" \
            --tags "heartbeat,copilot" \
            --source heartbeat-copilot \
            && echo "✅ Diary saved to Cosmos DB" || echo "⚠️ Cosmos write failed (non-fatal)"

      - name: Run heartbeat (grok — lightweight)
        if: steps.quota_check.outputs.mode == 'grok'
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_APIKEY: ${{ secrets.AZURE_APIKEY }}
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "gitclaw[bot]"
          git config user.email "gitclaw[bot]@users.noreply.github.com"

          DIARY=$(python3 .github/scripts/heartbeat-grok.py 2>/dev/null) || \
            DIARY="🦃 Crunch: grok heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ). Lightweight mode — no premium burned."

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "gitclaw: heartbeat $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
          for i in 1 2 3; do
            if git push origin main; then break; fi
            git pull --rebase origin main || { git rebase --abort; break; }
          done

          printf '%s' "$DIARY" | head -c 60000 > /tmp/heartbeat-response.txt
          GH_TOKEN="$GITHUB_TOKEN" gh issue comment 10 --body-file /tmp/heartbeat-response.txt

      - name: Persist diary to Cosmos DB (grok)
        if: steps.quota_check.outputs.mode == 'grok'
        env:
          COSMOS_ENDPOINT: ${{ secrets.COSMOS_ENDPOINT }}
          COSMOS_KEY: ${{ secrets.COSMOS_KEY }}
        run: |
          if [ -z "${COSMOS_ENDPOINT:-}" ] || [ -z "${COSMOS_KEY:-}" ]; then
            echo "⚠️ COSMOS_ENDPOINT/COSMOS_KEY not set — skipping Cosmos persist"
            exit 0
          fi
          CONTENT=$(cat /tmp/heartbeat-response.txt 2>/dev/null | head -c 8000 || echo "")
          if [ -z "$CONTENT" ]; then exit 0; fi
          python3 .github/scripts/cosmos-memory.py write \
            --type diary \
            --content "$CONTENT" \
            --tags "heartbeat,grok" \
            --source heartbeat-grok \
            && echo "✅ Diary saved to Cosmos DB" || echo "⚠️ Cosmos write failed (non-fatal)"
