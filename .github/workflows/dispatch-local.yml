name: Dispatch Task to Local (Strix)

on:
  issues:
    types: [labeled]

concurrency:
  group: claw-dispatch-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'dispatch/local'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y gpg msmtp python3-pip
          pip3 install python-gnupg

      - name: Import Crunch cloud GPG private key
        env:
          CLAW_CLOUD_GPG_PRIVATE: ${{ secrets.CLAW_CLOUD_GPG_PRIVATE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "$CLAW_CLOUD_GPG_PRIVATE" | gpg --batch --import
          echo "Cloud GPG key imported"

      - name: Package and sign task
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"

          # Fetch full issue with comments
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body --jq '.body')
          COMMENTS=$(gh issue view "$ISSUE_NUMBER" --json comments \
            --jq '[.comments[] | {author: .author.login, body: .body, createdAt: .createdAt}]')
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name]')

          # Build task JSON
          TASK_JSON=$(jq -n \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg dispatched_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson comments "$COMMENTS" \
            --argjson labels "$LABELS" \
            '{
              task_id: ("CLAW_TASK_" + $issue_number),
              issue_number: ($issue_number | tonumber),
              title: $title,
              body: $body,
              comments: $comments,
              labels: $labels,
              repo: $repo,
              dispatched_at: $dispatched_at,
              return_issue: ($issue_number | tonumber),
              spawn_depth: 1
            }')

          echo "$TASK_JSON" > /tmp/task.json

          # Sign the task JSON with Crunch's cloud key
          gpg --batch --armor --clearsign \
            --default-key crunchcloud.agent@aigege.de \
            /tmp/task.json

          mv /tmp/task.json.asc /tmp/task-signed.asc
          echo "Task signed:"
          head -5 /tmp/task-signed.asc

      - name: Send task via email to Strix
        env:
          CLAW_CLOUD_EMAIL: ${{ secrets.CLAW_CLOUD_EMAIL }}
          CLAW_CLOUD_EMAIL_PASS: ${{ secrets.CLAW_CLOUD_EMAIL_PASS }}
          CLAW_LOCAL_EMAIL: ${{ secrets.CLAW_LOCAL_EMAIL }}
          CLAW_SMTP_HOST: ${{ secrets.CLAW_SMTP_HOST }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"

          # Configure msmtp
          cat > ~/.msmtprc <<EOF
          account claw
          host ${CLAW_SMTP_HOST}
          port 465
          tls on
          tls_starttls off
          auth on
          user ${CLAW_CLOUD_EMAIL}
          password ${CLAW_CLOUD_EMAIL_PASS}
          from ${CLAW_CLOUD_EMAIL}
          account default : claw
          EOF
          chmod 600 ~/.msmtprc

          # Build email
          SUBJECT="CLAW_TASK: #${ISSUE_NUMBER} — ${TITLE}"
          SIGNED_BODY=$(cat /tmp/task-signed.asc)

          python3 - <<PYEOF
          import smtplib, ssl, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          msg = MIMEMultipart()
          msg['From'] = os.environ['CLAW_CLOUD_EMAIL']
          msg['To'] = os.environ['CLAW_LOCAL_EMAIL']
          msg['Subject'] = "CLAW_TASK: #${ISSUE_NUMBER} — ${TITLE}"
          msg['X-CLAW-Issue'] = "${ISSUE_NUMBER}"
          msg['X-CLAW-Repo'] = "${GITHUB_REPOSITORY}"

          with open('/tmp/task-signed.asc', 'r') as f:
              body = f.read()

          msg.attach(MIMEText(body, 'plain'))

          context = ssl.create_default_context()
          with smtplib.SMTP_SSL(os.environ['CLAW_SMTP_HOST'], 465, context=context) as server:
              server.login(os.environ['CLAW_CLOUD_EMAIL'], os.environ['CLAW_CLOUD_EMAIL_PASS'])
              server.sendmail(
                  os.environ['CLAW_CLOUD_EMAIL'],
                  os.environ['CLAW_LOCAL_EMAIL'],
                  msg.as_string()
              )
          print(f"Task dispatched to Strix: CLAW_TASK: #${ISSUE_NUMBER}")
          PYEOF

      - name: Comment on issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          BODY="📨 **Task dispatched to Strix** (local agent) via PGP-signed email.\n\nStrix will pick this up within 30 seconds, claim it, and start working. Results will be posted back here automatically.\n\n_Waiting for \`CLAW_RESULT:\` response from Strix..._"
          printf '%b' "$BODY" | gh issue comment "$ISSUE_NUMBER" --body-file -
