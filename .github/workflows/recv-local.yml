name: Receive Results from Local (Strix)

on:
  schedule:
    - cron: '*/5 * * * *'  # Poll every 5 minutes
  workflow_dispatch:
    inputs:
      recover_all:
        description: 'Search ALL emails (including already-seen) for recovery'
        type: boolean
        default: false

concurrency:
  group: claw-recv-local
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets are configured
        id: check_secrets
        env:
          CLAW_LOCAL_GPG_PUBLIC: ${{ secrets.CLAW_LOCAL_GPG_PUBLIC }}
          CLAW_IMAP_HOST: ${{ secrets.CLAW_IMAP_HOST }}
        run: |
          if [ -z "$CLAW_LOCAL_GPG_PUBLIC" ] || [ -z "$CLAW_IMAP_HOST" ]; then
            echo "⏭️  Strix secrets not yet configured — skipping recv poll"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          sudo apt-get install -y gpg python3-pip
          pip3 install python-gnupg

      - name: Import Strix local GPG public key
        if: steps.check_secrets.outputs.configured == 'true'
        env:
          CLAW_LOCAL_GPG_PUBLIC: ${{ secrets.CLAW_LOCAL_GPG_PUBLIC }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "$CLAW_LOCAL_GPG_PUBLIC" | gpg --batch --import
          echo "Strix public key imported"

      - name: Check inbox for Strix results
        if: steps.check_secrets.outputs.configured == 'true'
        env:
          CLAW_CLOUD_EMAIL: ${{ secrets.CLAW_CLOUD_EMAIL }}
          CLAW_CLOUD_EMAIL_PASS: ${{ secrets.CLAW_CLOUD_EMAIL_PASS }}
          CLAW_IMAP_HOST: ${{ secrets.CLAW_IMAP_HOST }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECOVER_ALL: ${{ inputs.recover_all || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import imaplib, email, os, json, subprocess, re, sys

          IMAP_HOST = os.environ['CLAW_IMAP_HOST']
          EMAIL = os.environ['CLAW_CLOUD_EMAIL']
          PASSWORD = os.environ['CLAW_CLOUD_EMAIL_PASS']
          RECOVER_ALL = os.environ.get('RECOVER_ALL', 'false').lower() == 'true'

          print(f"Connecting to {IMAP_HOST}:993...")
          mail = imaplib.IMAP4_SSL(IMAP_HOST, 993)
          mail.login(EMAIL, PASSWORD)
          mail.select('INBOX')

          # Search: UNSEEN for normal runs, ALL for recovery mode
          search_criteria = 'SUBJECT "CLAW_RESULT:"' if RECOVER_ALL else 'UNSEEN SUBJECT "CLAW_RESULT:"'
          _, data = mail.search(None, search_criteria)
          msg_ids = data[0].split()

          if not msg_ids:
              print(f"No {'(including seen) ' if RECOVER_ALL else 'new '}results from Strix.")
              sys.exit(0)

          print(f"Found {len(msg_ids)} result(s) from Strix {'(recovery mode)' if RECOVER_ALL else ''}")

          for msg_id in msg_ids:
              # PEEK avoids auto-marking as seen; we mark manually only on success
              _, msg_data = mail.fetch(msg_id, '(BODY.PEEK[])')
              raw_email = msg_data[0][1]
              msg = email.message_from_bytes(raw_email)

              subject = msg.get('Subject', '')
              issue_header = msg.get('X-CLAW-Issue', '')
              print(f"Processing: {subject} (issue #{issue_header})")

              # Extract issue number from subject or header
              # Supports formats: #73, GH-73, issue-73
              issue_num = issue_header
              if not issue_num:
                  m = re.search(r'(?:#|GH-|issue-|ISSUE-)(\d+)', subject, re.IGNORECASE)
                  if m:
                      issue_num = m.group(1)

              if not issue_num:
                  print(f"  Warning: no issue number found, skipping")
                  continue

              # Get email body
              body = ''
              if msg.is_multipart():
                  for part in msg.walk():
                      if part.get_content_type() == 'text/plain':
                          body = part.get_payload(decode=True).decode('utf-8', errors='replace')
                          break
              else:
                  body = msg.get_payload(decode=True).decode('utf-8', errors='replace')

              # Write signed body to temp file for GPG verification
              with open('/tmp/strix-result.asc', 'w') as f:
                  f.write(body)

              # Verify GPG signature
              result = subprocess.run(
                  ['gpg', '--batch', '--verify', '/tmp/strix-result.asc'],
                  capture_output=True, text=True
              )

              if result.returncode != 0:
                  print(f"  ⚠️ GPG verification FAILED for issue #{issue_num}: {result.stderr}")
                  # Post warning to issue
                  subprocess.run(['gh', 'issue', 'comment', issue_num,
                      '--body', f'⚠️ Received result from local agent but GPG signature verification FAILED. Result discarded for security. Check Strix key configuration.\n\nGPG error: `{result.stderr[:500]}`'],
                      env={**os.environ})
                  continue

              print(f"  ✅ GPG signature valid for issue #{issue_num}")

              # Extract the signed content (strip GPG armor)
              signed_content = subprocess.run(
                  ['gpg', '--batch', '--output', '-', '--decrypt', '/tmp/strix-result.asc'],
                  capture_output=True, text=True
              )

              result_text = signed_content.stdout if signed_content.stdout else body

              # Try to parse as JSON for structured results
              result_body = result_text
              close_issue = False
              try:
                  # Look for JSON in the content
                  json_match = re.search(r'\{.*\}', result_text, re.DOTALL)
                  if json_match:
                      result_json = json.loads(json_match.group())
                      result_body = result_json.get('result', result_text)
                      close_issue = result_json.get('status') == 'done'
              except Exception:
                  pass

              # Post result to GitHub issue
              comment = f"🦉 **Strix (local agent) result:**\n\n{result_body}\n\n---\n_Verified PGP signature from Strix local agent ✅_"
              with open('/tmp/strix-comment.txt', 'w') as f:
                  f.write(comment[:60000])

              subprocess.run(['gh', 'issue', 'comment', issue_num,
                  '--body-file', '/tmp/strix-comment.txt'],
                  env={**os.environ})

              if close_issue:
                  subprocess.run(['gh', 'issue', 'close', issue_num,
                      '--comment', '✅ Completed by Strix local agent'],
                      env={**os.environ})
                  print(f"  Closed issue #{issue_num}")

              # Mark email as read
              mail.store(msg_id, '+FLAGS', '\\Seen')
              print(f"  ✅ Processed result for issue #{issue_num}")

          mail.close()
          mail.logout()
          PYEOF
